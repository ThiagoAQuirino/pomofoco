<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pomofoco — Manual</title>
<style>
  :root {
    --bg: #1b1d23; --card: #23262e; --text: #e8eaed; --muted: #9aa0b0;
    --focus: #ff6b6b; --short: #4dd4ac; --long: #4d9bff; --line: #2e313a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.55; font-size: 14px;
    padding: 22px 20px 40px;
  }
  h1 { font-size: 20px; margin-bottom: 2px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
  h2 {
    font-size: 14px; margin: 22px 0 8px;
    padding-bottom: 5px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 8px;
  }
  h2 .ic {
    width: 22px; height: 22px; flex: 0 0 auto;
    display: inline-grid; place-items: center;
    background: var(--card); border-radius: 6px; font-size: 13px;
  }
  p { color: var(--text); margin: 6px 0; }
  ul { list-style: none; margin: 6px 0; }
  li { position: relative; padding: 4px 0 4px 20px; }
  li::before { content: "•"; position: absolute; left: 4px; color: var(--focus); }
  b { color: #fff; }
  .key {
    display: inline-block; background: var(--card); border: 1px solid var(--line);
    border-radius: 5px; padding: 1px 7px; font-size: 12px; color: var(--text);
    font-family: "Segoe UI", monospace;
  }
  .chip {
    display: inline-block; padding: 1px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 600; color: #fff;
  }
  .tip {
    background: var(--card); border-left: 3px solid var(--short);
    border-radius: 8px; padding: 10px 12px; margin: 18px 0 6px; color: var(--text);
  }
  .muted { color: var(--muted); }
  code { background: var(--card); padding: 1px 6px; border-radius: 5px; font-size: 12px; }
  .donate-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, #ff6b6b, #ff9558);
    color: #fff; border: none; border-radius: 10px;
    padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer; margin: 6px 0;
  }
  .donate-btn:hover { filter: brightness(1.07); }
  #thanks { display: none; margin-top: 12px; background: var(--card); border-radius: 10px; padding: 14px; border-left: 3px solid var(--focus); }
  #thanks.open { display: block; }
  .thanksmsg { color: var(--text); }
  .pixbox { margin-top: 12px; background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; }
  .pixlabel { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .pixrow { display: flex; align-items: center; gap: 8px; }
  #pixkey { flex: 1; min-width: 0; overflow-wrap: anywhere; background: transparent; color: var(--text); font-size: 12px; }
  #copyPix { flex: 0 0 auto; background: var(--short); color: #08231b; border: none; border-radius: 7px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
  #copyPix:hover { filter: brightness(1.05); }
  .qrwrap { text-align: center; margin-top: 14px; }
  .qrcap { display: block; font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .pixqr { width: 200px; height: 200px; background: #fff; border-radius: 12px; padding: 8px; }
  .pixor { text-align: center; font-size: 11px; color: var(--muted); margin: 10px 0 0; }
  .copiacola { width: 100%; margin-top: 10px; background: var(--card); color: var(--text); border: 1px solid var(--line); border-radius: 8px; padding: 9px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .copiacola:hover { background: #2c3039; }
</style>
</head>
<body>
  <h1 data-i18n-html="m_title">🍅 Pomofoco — Manual</h1>
  <div class="sub" data-i18n="m_sub"></div>

  <p data-i18n-html="m_intro"></p>

    <li data-i18n-html="m_stats_4"></li>
  </ul>

  <h2><span class="ic">⚙</span> <span data-i18n="m_config_h"></span></h2>
  <ul>
    <li data-i18n-html="m_config_1"></li>
    <li data-i18n-html="m_config_2"></li>

    <p class="thanksmsg" data-i18n-html="m_thanks"></p>
    <div class="qrwrap">
      <span class="qrcap" data-i18n="m_qr_cap"></span>
      <img class="pixqr" src="pix-qr.png" alt="QR Code Pix">
    </div>
    <p class="pixor" data-i18n="m_or_key"></p>
    <div class="pixbox">
      <span class="pixlabel" data-i18n="m_pix_label"></span>
      <div class="pixrow">
        <code id="pixkey">f5d89e92-9364-4c56-93c6-d9c6d472d973</code>
        <button id="copyPix">Copiar</button>
      </div>
    </div>
    <button class="copiacola" id="copyCopiaCola" data-i18n="m_copiacola"></button>
    <code id="pixpayload" style="display:none">00020126580014br.gov.bcb.pix0136f5d89e92-9364-4c56-93c6-d9c6d472d9735204000053039865802BR5916THIAGO A QUIRINO6007MARINGA62070503***6304F3C4</code>
  </div>

  <div class="tip" data-i18n-html="m_tip"></div>

  <p class="muted" style="margin-top:16px;font-size:12px" data-i18n="m_note"></p>

  <script src="i18n.js"></script>
  <script>
    (function () {
      var lang = new URLSearchParams(location.search).get("lang") || "pt";
      var STR = window.I18N[lang] || window.I18N.pt;
      function t(k) { return (STR[k] != null) ? STR[k] : (window.I18N.pt[k] != null ? window.I18N.pt[k] : k); }
      document.documentElement.lang = lang;
      document.querySelectorAll("[data-i18n]").forEach(function (e) { e.textContent = t(e.getAttribute("data-i18n")); });
      document.querySelectorAll("[data-i18n-html]").forEach(function (e) { e.innerHTML = t(e.getAttribute("data-i18n-html")); });

      var COPY = ({
        pt: ["Copiar", "Copiado! ✓", "Código copiado! ✓"],
        en: ["Copy", "Copied! ✓", "Code copied! ✓"],
        es: ["Copiar", "¡Copiado! ✓", "¡Código copiado! ✓"],
      })[lang] || ["Copiar", "Copiado! ✓", "Código copiado! ✓"];

      var apoiar = document.getElementById("apoiarBtn");
      var thanks = document.getElementById("thanks");
      apoiar.addEventListener("click", function () {
        thanks.classList.add("open");
        thanks.scrollIntoView({ behavior: "smooth", block: "nearest" });
      });

      function copyText(text, btn, okLabel) {
        (async function () {
          try {
            await navigator.clipboard.writeText(text);
          } catch (e) {
            var ta = document.createElement("textarea");
            ta.value = text; document.body.appendChild(ta); ta.select();
            try { document.execCommand("copy"); } catch (_) {}
            document.body.removeChild(ta);
          }
          var orig = btn.textContent;
          btn.textContent = okLabel;
          setTimeout(function () { btn.textContent = orig; }, 1600);
        })();
      }

      var copyKey = document.getElementById("copyPix");
      copyKey.textContent = COPY[0];
      copyKey.addEventListener("click", function () {
        copyText(document.getElementById("pixkey").textContent.trim(), copyKey, COPY[1]);
      });

      var copyCC = document.getElementById("copyCopiaCola");
      copyCC.addEventListener("click", function () {
        copyText(document.getElementById("pixpayload").textContent.trim(), copyCC, COPY[2]);
      });
    })();
  </script>
</body>
</html>
