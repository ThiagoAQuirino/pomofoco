name: Release

# Dispara ao enviar uma tag de versão (ex.: v1.0.0) ou manualmente.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # necessário pro electron-builder criar a Release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build & publish (NSIS)
        run: npx electron-builder --win nsis --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Sem assinatura por enquanto (SignPath entra aqui depois).
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
